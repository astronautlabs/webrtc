version: 2.1
orbs:
  node: circleci/node@7.2.1
  win: circleci/windows@5.1.1
  macos: circleci/macos@2.4.1
  windows-defender: circleci/windows-defender@0.0.2

parameters:
  main_node_version:
    type: string
    default: 18.20.8
workflows:
  build:

    jobs:
      #################################
      # CANARY BUILD/TEST
      # - For normal commits, run a single build with no binary publishing
      #################################
      - build:
          matrix:
            alias: canary_build
            parameters:
              os: [windows]
              arch: [x64]
              build-type: ["Debug"]
          filters: { tags: { only: /^v.*|^ci-test-.*/ } }
      - test:
          requires: [canary_build]
          matrix:
            alias: canary_test
            parameters:
              os: [windows]
              arch: [x64]
              build-type: ["Debug"]
              node-version:
                - << pipeline.parameters.main_node_version >>
                - "22.23.1"
                - "26.5.0"
          filters: { tags: { only: /^v.*|^ci-test-.*/ } }
      #################################
      # RELEASE BUILD/TEST
      # - For normal commits, run a single build with no binary publishing
      #################################
      - build:
          requires: [canary_test]
          filters: { branches: { ignore: /.*/ }, tags: { only: /^v.*|^ci-test-.*/ } }
          matrix:
            alias: build_binaries_debug
            parameters:
              os: [linux, windows, darwin]
              arch: [x64, arm64]
              build-type: ["Debug"]
            exclude:
              - { os: linux, arch: x64, build-type: Debug } # already done by the canary build
              - { os: darwin, arch: x64, build-type: Debug }
              - { os: windows, arch: arm64, build-type: Debug }
      - test:
          filters: { branches: { ignore: /.*/ }, tags: { only: /^v.*|^ci-test-.*/ } }
          requires: [build_binaries_debug]
          matrix:
            alias: test_binaries
            parameters:
              os: [linux, windows, darwin]
              arch: [x64, arm64]
              build-type: ["Debug"]
            exclude:
              - { os: linux, arch: x64, build-type: Debug } # already done by the canary test
              - { os: darwin, arch: x64, build-type: Debug }
              - { os: windows, arch: arm64, build-type: Debug }
      - build:
          requires: [test_binaries]
          filters: { branches: { ignore: /.*/ }, tags: { only: /^v.*|^ci-test-.*/ } }
          matrix:
            alias: build_binaries_release
            parameters:
              os: [linux, windows, darwin]
              arch: [x64, arm64]
              build-type: ["Release"]
            exclude:
              - { os: darwin, arch: x64, build-type: Release }
              - { os: windows, arch: arm64, build-type: Release }
      - approve_publishing:
          filters: { branches: { ignore: /.*/ }, tags: { only: /^v.*|^ci-test-.*/ } }
          type: approval
          requires: [build_binaries_release]
      - publish_binary_release:
          filters: { branches: { ignore: /.*/ }, tags: { only: /^v.*|^ci-test-.*/ } }
          matrix:
            parameters:
              os: [linux, windows, darwin]
              arch: [x64, arm64]
              build-type: ["Debug", "Release"]
            exclude:
              - { os: darwin, arch: x64, build-type: Debug }
              - { os: darwin, arch: x64, build-type: Release }
              - { os: windows, arch: arm64, build-type: Debug }
              - { os: windows, arch: arm64, build-type: Release }
          context: "@/webrtc/binaries"
          requires: [approve_publishing]

executors:
  linux-x64:
    docker:
      - image: ubuntu:26.04
    environment:
      TARGET_ARCH: x64
      CMAKE_BUILD_TYPE: Release
      PLATFORM: linux
    resource_class: xlarge
  linux-arm64:
    machine:
      image: ubuntu-2604:current
    resource_class: arm.medium
    environment:
      TARGET_ARCH: arm64
      CMAKE_BUILD_TYPE: Release
      PLATFORM: linux
  windows-x64:
    machine:
      image: windows-server-2025-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: windows.large
    environment:
      PLATFORM: windows
  windows-arm64:
    machine:
      image: windows-server-2025-gui:current
      shell: powershell.exe -ExecutionPolicy Bypass
    resource_class: arm.medium # probably wrong, not sure circle supports windows/arm
    environment:
      PLATFORM: windows
  darwin-arm64:
    macos:
      xcode: "27.0"
    resource_class: m4pro.medium
    environment:
      TARGET_ARCH: arm64
      PLATFORM: darwin
  darwin-x64:
    macos:
      xcode: "27.0"
    resource_class: m4pro.medium
    environment:
      TARGET_ARCH: x64
      PLATFORM: darwin
jobs:
  build:
    parameters:
      node-version: { type: string, default: << pipeline.parameters.main_node_version >> }
      os:           { type: string }
      arch:         { type: string }
      build-type:   { type: string }
    executor: "<< parameters.os >>-<< parameters.arch >>"
    working_directory: ~/node-webrtc
    steps:
      - configure_builds:
          os: <<parameters.os>>
          build-type: <<parameters.build-type>>
      - platform_setup:
          os: <<parameters.os>>
      - node_install:
          os: << parameters.os >>
          version: "<< parameters.node-version >>"
      - setup_workspace:
          os: << parameters.os >>
      - checkout
      - run:
          name: Restore file modification timestamps for faster build
          command: git-restore-mtime
      - setup_cache_key
      - npm_install:
          os: << parameters.os >>
      - configure_parallelism: { os: <<parameters.os>>, value: "8" }
      - build_addon:
          os: << parameters.os >>
      - store_binary:
          os: << parameters.os >>
          arch: << parameters.arch >>
          build-type: << parameters.build-type >>
  test:
    parameters:
      node-version: { type: string, default: << pipeline.parameters.main_node_version >> }
      os:           { type: string }
      arch:         { type: string }
      build-type:   { type: string }
    executor: << parameters.os >>-<< parameters.arch >>
    steps:
      - platform_setup:
          os: <<parameters.os>>
      - node_install:
          os: << parameters.os >>
          version: "<< parameters.node-version >>"
      - setup_workspace:
          os: << parameters.os >>
      - checkout
      - setup_cache_key
      - npm_install:
          os: << parameters.os >>
      - run:
          name: Build Typescript
          command: npm run build:tsc
      - acquire_binary:
          os: << parameters.os >>
          arch: << parameters.arch >>
          build-type: << parameters.build-type >>
      - run_tests

  publish_binary_release:
    parameters:
      node-version: { type: string, default: << pipeline.parameters.main_node_version >> }
      os:           { type: string }
      arch:         { type: string }
      build-type:   { type: string }
    executor: linux-x64
    steps:
      - platform_setup:
          os: <<parameters.os>>
      - node_install:
          os: << parameters.os >>
          version: "<< parameters.node-version >>"
      - setup_workspace:
          os: << parameters.os >>
      - checkout
      - setup_cache_key
      - npm_install:
          os: << parameters.os >>
      - run:
          name: Build Typescript
          command: npm run build:tsc
      - acquire_binary:
          os: << parameters.os >>
          arch: << parameters.arch >>
          build-type: << parameters.build-type >>
      - publish_binary

commands:
  ###
  # SETUP WORKSPACE
  ###
  setup_workspace:
    description: Setup Workspace
    parameters:
      os: { type: string }
    steps:
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - attach_workspace:
                at: c:\workspace
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - attach_workspace:
                at: /tmp/workspace
  build_addon:
    description: Build @/webrtc
    parameters:
        os: { type: string }
    steps:
      - restore_cache:
          name: Restore cached libwebrtc build
          key: asset-cache-v5-{{ arch }}-{{ checksum "CACHE_KEY" }}-{{ checksum "CMakeLists.txt" }}

      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: Build libwebrtc + Node.js bindings
                command: |
                    # Make sure LLVM is in the path
                    # TODO(liam): It is already in the path, but I'd like to get it out and only add it for this step.
                    $env:PATH = "C:\Program Files\LLVM\bin;$env:PATH"

                    echo "Clang version:"
                    clang --version

                    echo
                    echo "Building @/webrtc..."
                    npm run build:native
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - run:
                name: Build libwebrtc + Node.js bindings
                command: npm run build:native
      - run:
          name: Build libwebrtc + Node.js bindings
          command: npm run build:native
      - run:
          name: Build Typescript
          command: npm run build:tsc
      - save_cache:
          name: Saving build cache
          key: asset-cache-v5-{{ arch }}-{{ checksum "CACHE_KEY" }}-{{ checksum "CMakeLists.txt" }}
          paths:
            - build
            - ~/.cache/ccache
            - ~/.ccache
  node_install:
    parameters:
      os: { type: string }
      version: { type: string }
    steps:
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: Install Node.js << parameters.version >>
                command: |
                  nvm install << parameters.version>>
                  nvm use << parameters.version >>
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - node/install: { node-version: "<< parameters.version >>" }
  ###
  # NPM INSTALL
  ###
  npm_install:
    description: npm install
    parameters:
        os: { type: string }
    steps:
      - restore_cache:
          name: Restore cached NPM modules
          key: modules-cache-v2-{{ arch }}-{{ checksum "CACHE_KEY" }}-{{ checksum "package.json" }}
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: npm install
                command: |
                    # Remove LLVM from the PATH before running npm install so it doesn't interfere with native modules
                    # that just want Visual Studio.
                    $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -notmatch 'LLVM' }) -join ';'

                    npm install
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - run: npm install

      - save_cache:
          name: Cache NPM modules
          key: modules-cache-v2-{{ arch }}-{{ checksum "CACHE_KEY" }}-{{ checksum "package.json" }}
          paths:
            - node_modules
  ###
  # PUBLISH BINARY
  ###
  publish_binary:
    description: Publish binary to CDN
    steps:
      - run:
          name: Publish Binary
          command: |
            npm run publish-binary
  ###
  # TEST ELECTRON
  ###
  test_electron:
    description: Test Electron
    steps:
      - run:
          name: Test Electron
          command: |
            ulimit -c unlimited
            if [[ "$(uname)" == Linux ]]; then
              xvfb-run ./node_modules/.bin/electron dist/nodejs/test/electron/index.js --no-sandbox
            else
              npm run test:electron
            fi
  setup_cache_key:
    description: Set up a cache key variable used to invalidate build caches
    steps:
      - run:
          name: Before restore cache...
          command: |
            echo >>CACHE_KEY "TARGET_ARCH=$TARGET_ARCH"
            echo >>CACHE_KEY "CMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE"
            echo >>CACHE_KEY "TARGET_PLATFORM=$TARGET_PLATFORM"
            cat CACHE_KEY
  cpp_tests:
    steps:
      - run:
          name: Run C++ unit tests
          command: |
            ulimit -c unlimited
            if [[ "$CMAKE_BUILD_TYPE" == Debug ]]; then
              node dist/nodejs/test/cpp-test.js
            else
              echo "Skipping C++ unit tests (not available on a release build)"
            fi
  unit_tests:
    steps:
      - run:
          name: Run Unit and Integration Tests
          command: |
            ulimit -c unlimited
            export CHECK_REFLEXIVE=true
            npm test -- --runInBand --verbose --ci
  ###
  # ARM UNIT TESTS (in emulator)
  ###
  arm_unit_tests:
    steps:
      - run:
          name: Run Unit and Integration Tests
          command: |
            ulimit -c unlimited
            export NODE_VERSION=$(node -v | tr -d '\n')
            export CHECK_REFLEXIVE=true
            qemu-aarch64 -L ~/node-webrtc/build/external/libwebrtc/download/src/build/linux/debian_sid_arm64-sysroot ~/node-$NODE_VERSION-linux-arm64/bin/node node_modules/.bin/jest
  ###
  # WEB PLATFORM TESTS
  ###
  wpt_tests:
    steps:
      - run:
          name: Setup /etc/hosts for Web Platform Tests (x64-only)
          command: |
            cat ci/wpt-hosts >>/etc/hosts
      - run:
          name: Run Web Platform Tests (x64-only)
          command: |
            ulimit -c unlimited
            if [[ "$TARGET_ARCH" == arm* ]]; then
              echo "Skipping..."
              exit 0
            fi

            if [[ "$(uname)" == Linux ]]; then
              sudo apt install --reinstall python-pkg-resources
              #pip install --upgrade requests
            fi

            npm run wpt:init
            npm run wpt:test
  ###
  # RUN BROWSER TESTS
  ###
  browser_tests:
    steps:
      - run:
          name: Browser Tests
          command: |
            ulimit -c unlimited
            npm run test:browser
  ###
  # STORE BUILD FOR LATER USE
  ###
  store_binary:
    parameters:
      os: { type: string }
      arch: { type: string }
      build-type: { type: string }
    steps:
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: Storing Binary (<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>)
                command: |
                  mkdir -force c:/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>
                  cd c:/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>
                  cp ~/node-webrtc/build/<<parameters.build-type>>/wrtc.node wrtc.node
            - store_artifacts:
                path: c:/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>/wrtc.node
                destination: wrtc-<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>.node
            - persist_to_workspace:
                root: c:/workspace
                paths:
                  - "*"
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - run:
                name: Storing Binary (<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>)
                command: |
                  mkdir -p /tmp/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>
                  cd /tmp/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>
                  cp ~/node-webrtc/build/<<parameters.build-type>>/wrtc.node wrtc.node
            - store_artifacts:
                path: /tmp/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>/wrtc.node
                destination: wrtc-<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>.node
            - persist_to_workspace:
                root: /tmp/workspace
                paths:
                  - "*"
  acquire_binary:
    description: Acquire Binary
    parameters:
      os: { type: string }
      arch: { type: string }
      build-type: { type: string }
    steps:
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: Acquire Binary (<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>)
                command: |
                  Remove-Item -Path "build/Release" -Recurse
                  Remove-Item -Path "build/Debug" -Recurse
                  mkdir build
                  mkdir build/<<parameters.build-type>>
                  cp c:/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>/wrtc.node build/<<parameters.build-type>>/
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - run:
                name: Acquire Binary (<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>)
                command: |
                  rm -Rf build/Release build/Debug
                  mkdir -p build/<<parameters.build-type>>
                  cp /tmp/workspace/<<parameters.os>>-<<parameters.arch>>-<<parameters.build-type>>/wrtc.node build/<<parameters.build-type>>/
  ###
  # PLATFORM-SPECIFIC INSTALLATIONS
  ###
  platform_setup:
    parameters:
      os: { type: string }
    steps:
      ###
      # MACOS SPECIFIC SETUP
      ###
      - when:
          condition: { equal: [ darwin, << parameters.os >> ] }
          steps:
            - macos/install-rosetta
            - set_env_var:
                os: << parameters.os >>
                label: Set target platform
                var: TARGET_PLATFORM
                value: darwin
            - run:
                name: Install build tools
                command: |
                  brew install cmake kamilturek/python2/python@2 ccache
                  sudo curl -sSL https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2025.08/git-restore-mtime -o /usr/local/bin/git-restore-mtime
                  chmod +x /usr/local/bin/git-restore-mtime
      ###
      # WINDOWS SPECIFIC SETUP
      ###
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - set_env_var:
                os: << parameters.os >>
                label: Set target platform
                var: TARGET_PLATFORM
                value: windows
            - windows-defender/disable
            - run:
                name: Windows Setup
                shell: powershell.exe
                command: |
                    # Add C:/scripts to the PATH for local utility scripts
                    Add-Content -Path $Profile.CurrentUserAllHosts -Value '$env:PATH = "C:\scripts;$env:PATH"'
                    $env:PATH = "C:\scripts;$env:PATH"
                    mkdir C:/scripts

                    # Enable long file paths
                    New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
                    git config --global core.longpaths true

                    # Install tools
                    choco install -y python curl cmake python windows-sdk-10-version-2004-all sccache --no-progress
                    Update-SessionEnvironment

                    # Alias python -> python3 (gn depends on it)
                    echo "Aliasing python to python3"
                    $py = (Get-Command python.exe).Source;
                    Copy-Item -Path $py -Destination (Join-Path (Split-Path $py) "python3.exe") -Force

                    echo "Installing git-restore-mtime..."
                    curl.exe -sSL https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2025.08/git-restore-mtime -o c:/scripts/git-restore-mtime.py
                    'python3 c:/scripts/git-restore-mtime.py' | Out-File -FilePath 'C:/scripts/git-restore-mtime.ps1'

                    echo "Downloading LLVM 22..."
                    curl.exe -sSL https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.0/LLVM-22.1.0-win64.exe -o c:/llvm-setup.exe
                    c:/llvm-setup.exe /S

                    echo "Information about working directory"

                    echo "Directory:"
                    pwd

                    echo "Listing:"
                    ls

                    echo "Done."
      ###
      # LINUX SPECIFIC SETUP
      ###
      - when:
          condition: { equal: [ linux, << parameters.os >> ] }
          steps:
            - set_env_var:
                os: << parameters.os >>
                label: Set target platform
                var: TARGET_PLATFORM
                value: linux
            - run:
                name: Install platform dependencies
                command: |
                  # Ubuntu on arm64 doesn't run as root, but ubuntu on x64 does.
                  # Ubuntu on x64 doesn't have sudo installed by default, but, naturally, ubuntu on arm64 does
                  # Just use sudo if it exists, otherwise don't. We'll install sudo so we don't have to do this
                  # for other incidental package installations though.
                  if ! which sudo &>/dev/null; then
                    sudo=
                  fi

                  $sudo apt update
                  $sudo ln -fs /usr/share/zoneinfo/America/Los_Angeles /etc/localtime
                  DEBIAN_FRONTEND=noninteractive $sudo apt install -y tzdata
                  $sudo dpkg-reconfigure --frontend noninteractive tzdata

                  $sudo apt install -y \
                      sudo lsb-release software-properties-common gnupg wget cmake build-essential curl git \
                      python3 python3-pkg-resources libglib2.0-dev ninja-build libnspr4 libnss3 \
                      libatk1.0-0 libatk-bridge2.0-0 libcups2 libcairo2 libgtk-3-0 libasound2t64 xvfb ccache
                  $sudo curl https://apt.llvm.org/llvm.sh >/tmp/llvm.sh
                  $sudo chmod +x /tmp/llvm.sh
                  $sudo /tmp/llvm.sh 23
                  $sudo ln -s `which python3` /usr/local/bin/python
                  $sudo ln -s `which clang-23` /usr/local/bin/clang
                  $sudo ln -s `which clang++-23` /usr/local/bin/clang++

                  sudo curl -sSL https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2025.08/git-restore-mtime -o /usr/local/bin/git-restore-mtime
                  chmod +x /usr/local/bin/git-restore-mtime
            - run:
                name: Toolchain versions
                command: |
                  set -x
                  clang --version
                  cmake --version
                  ninja --version
  # UTILITY: SET ENVIRONMENT VARIABLE
  # - Ensures the environment variable will be available for subsequent steps
  ###
  set_env_var:
    parameters:
      label:
        type: string
      os:
        type: string
      var:
        type: string
      value:
        type: string
    steps:
      - when:
          condition: { equal: [ windows, << parameters.os >> ] }
          steps:
            - run:
                name: << parameters.label >>
                command: Add-Content -Path $Profile.CurrentUserAllHosts -Value '$env:<< parameters.var >> = "<< parameters.value >>"'
      - when:
          condition: { not: { equal: [ windows, << parameters.os >> ] } }
          steps:
            - run:
                name: << parameters.label >>
                command: echo 'export << parameters.var >>="<< parameters.value >>"' >> $BASH_ENV
  ###
  # CONFIGURE DEBUG BUILDS
  ###
  configure_builds:
    parameters:
      build-type: { type: string }
      os: { type: string }
    steps:
      - when:
          condition:
            equal: [ "Debug", << parameters.build-type >> ]
          steps:
            - set_env_var:
                os: << parameters.os >>
                label: Set CMake build type (Debug)
                var: CMAKE_BUILD_TYPE
                value: Debug
            - set_env_var:
                os: << parameters.os >>
                label: Set DEBUG=true
                var: DEBUG
                value: "true"
  configure_parallelism:
    parameters:
      value: { type: string }
      os: { type: string }
    steps:
      - set_env_var: { os: << parameters.os >>, label: "Configure parallelism", var: PARALLELISM, value: "<< parameters.value >>" }
  run_tests:
    steps:
      - run:
          name: Determine core dump location
          command: cat /proc/sys/kernel/core_pattern
      - cpp_tests
      - unit_tests
      # - wpt_tests
      - browser_tests
      - test_electron
      - run:
          command: |
            mkdir -p /tmp/core_dumps
            cp core* /tmp/core_dumps || true
            cp report.*.json /tmp/core_dumps || true
            cp /var/crash/* /tmp/core_dumps || true
            cp /var/lib/apport/coredump/* /tmp/core_dumps || true
          when: on_fail
      - store_artifacts:
          name: Uploading core dumps (current directory)
          path: /tmp/core_dumps
          destination: core-dumps/
